services:
  docs-api:
    build: .
    environment:
      DOCS_QDRANT_URL: http://qdrant:6333
      DOCS_RETRIEVAL_MODE: qdrant
      DOCS_EMBEDDING_MODE: deterministic
      DOCS_RERANKER_ENABLED: "false"
      DOCS_API_KEYS: ${DOCS_API_KEYS:-dev-local-secret}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data:ro
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  qdrant-data:
