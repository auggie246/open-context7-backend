{{- if and .Values.qdrant.enabled .Values.qdrant.persistence.enabled -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "open-context7-backend.fullname" . }}-qdrant
  labels:
    {{- include "open-context7-backend.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.qdrant.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.qdrant.persistence.size }}
  {{- if .Values.qdrant.persistence.storageClassName }}
  storageClassName: {{ .Values.qdrant.persistence.storageClassName | quote }}
  {{- end }}
{{- end }}
