{{- if and .Values.config.apiKeys (not .Values.config.existingApiKeysSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "open-context7-backend.apiKeysSecretName" . }}
  labels:
    {{- include "open-context7-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.config.apiKeysSecretKey }}: {{ .Values.config.apiKeys | quote }}
{{- end }}
