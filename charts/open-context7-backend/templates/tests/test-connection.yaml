apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "open-context7-backend.fullname" . }}-test-connection"
  labels:
    {{- include "open-context7-backend.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.11.1
      command:
        - curl
      args:
        - --fail
        - "http://{{ include "open-context7-backend.fullname" . }}:{{ .Values.service.port }}/healthz"
